<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Dependency Risk Analyzer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-4xl mx-auto p-10">

<h1 class="text-4xl font-bold text-cyan-400 mb-4">
AI Dependency Risk Analyzer
</h1>

<p class="text-gray-300 mb-8">
Detect supply-chain risks in your project's dependencies using rule-based
analysis and AI explanations.
</p>

<div class="bg-slate-800 p-6 rounded-xl shadow-lg">

<input id="fileInput"
type="file"
class="mb-4 block text-black">

<button
onclick="analyze()"
class="bg-cyan-500 hover:bg-cyan-600 px-5 py-2 rounded">
Analyze Dependencies
</button>

<button
onclick="demo()"
class="ml-3 bg-gray-600 hover:bg-gray-700 px-5 py-2 rounded">
Run Demo
</button>

</div>

<div id="result" class="mt-10"></div>

</div>

<script src="/app.js"></script>

</body>
</html>
